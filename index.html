<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNOTE 주간 매출 현황 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ========== RESET & GLOBAL ========== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body {
  font-family:'Noto Sans KR', sans-serif;
  background:#F0F2F5;
  color:#1a1a1a;
  min-height:100vh;
}

/* ========== HEADER ========== */
.header {
  background:linear-gradient(135deg, #0F1B3D 0%, #1B2E5C 100%);
  padding:24px 32px 0;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:16px;
}
.logo { font-size:1.6rem; font-weight:900; color:#fff; letter-spacing:1px; }
.logo b { color:#4A90D9; }
.header-date { color:rgba(255,255,255,.7); font-size:1rem; font-weight:600; }

/* ========== CONTENT ========== */
.content { max-width:1400px; margin:0 auto; padding:28px 28px 48px; }

/* ========== SECTION ========== */
.section {
  background:#fff; border-radius:12px; margin-bottom:24px;
  box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden;
}
.section-header {
  padding:16px 24px; font-size:1.15rem; font-weight:700; color:#0F1B3D;
  border-bottom:2px solid #E8EBF0;
  display:flex; align-items:center; gap:8px; justify-content:space-between; flex-wrap:wrap;
}
.section-header-left { display:flex; align-items:center; gap:8px; }
.section-header .badge {
  display:inline-block; background:#4A90D9; color:#fff; font-size:.75rem; font-weight:600;
  padding:3px 10px; border-radius:10px; letter-spacing:.5px;
}
.section-body { padding:20px 24px; overflow-x:auto; }

/* ========== SUMMARY TABLE (S1) ========== */
.summary-wrap { margin-bottom:24px; }
.summary-wrap:last-child { margin-bottom:0; }
.summary-label { font-size:1rem; font-weight:700; color:#1B2E5C; margin-bottom:10px; padding-left:4px; }
table.summary { width:100%; border-collapse:collapse; }
table.summary th, table.summary td {
  border:1px solid #D8DCE3; padding:12px 16px; text-align:center; font-size:.95rem; vertical-align:middle;
}
table.summary th { background:#F5F7FA; font-weight:600; color:#1B2E5C; }
.summary .big-num { font-size:1.55rem; font-weight:800; color:#0F1B3D; }
.summary .sub-cell { text-align:left; padding:14px 16px; line-height:1; }
.summary .sub-cell .row-item {
  display:flex; justify-content:space-between; align-items:center; font-size:.95rem; padding:6px 0;
}
.summary .sub-cell .row-item + .row-item { border-top:1px dashed #E0E3E8; }
.summary .sub-cell .row-item .label { color:#666; font-size:.9rem; min-width:72px; }
.summary .sub-cell .row-item .value { font-weight:700; color:#0F1B3D; font-size:1.05rem; text-align:right; }
.summary .sub-cell .row-item.pct .value { font-size:1rem; font-weight:700; }
.summary .sub-cell .row-item.pct .value.pct-up { color:#E53935; }
.summary .sub-cell .row-item.pct .value.pct-down { color:#1E88E5; }

/* ========== S1 MOBILE CARDS ========== */
.s1-mobile { display:none; }
.mk-hero { background:linear-gradient(135deg,#0F1B3D 0%,#1B2E5C 100%); border-radius:8px; padding:16px; text-align:center; margin-bottom:8px; }
.mk-hero-label { color:rgba(255,255,255,.7); font-size:.92rem; font-weight:500; margin-bottom:6px; }
.mk-hero-label span { font-size:.78rem; font-weight:400; }
.mk-hero-value { color:#fff; font-size:1.6rem; font-weight:800; letter-spacing:.5px; }
.mk-sub-row { display:flex; gap:6px; margin-bottom:10px; }
.mk-sub-item { flex:1; background:#F5F7FA; border-radius:6px; padding:10px; text-align:center; border:1px solid #E8EBF0; }
.mk-sub-label { font-size:.78rem; color:#666; margin-bottom:4px; }
.mk-sub-value { font-size:1.05rem; font-weight:700; color:#0F1B3D; }
.mk-progress .mk-sub-value { font-size:1.2rem; }
.mc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.mc-card { border:1px solid #D8DCE3; border-radius:8px; padding:12px; background:#fff; }
.mc-title { font-size:.85rem; font-weight:600; color:#1B2E5C; margin-bottom:6px; border-bottom:1px solid #E8EBF0; padding-bottom:4px; }
.mc-row { display:flex; justify-content:space-between; align-items:center; font-size:.88rem; padding:3px 0; }
.mc-label { color:#666; font-size:.78rem; }
.mc-val { font-weight:700; color:#0F1B3D; font-size:.95rem; }

/* ========== DATA TABLE ========== */
table.data-tbl { width:100%; border-collapse:collapse; white-space:nowrap; }
table.data-tbl th, table.data-tbl td { border:1px solid #D8DCE3; padding:11px 14px; font-size:.92rem; vertical-align:middle; }
table.data-tbl th { background:#F5F7FA; font-weight:600; color:#1B2E5C; text-align:center; }
table.data-tbl td { text-align:right; }
table.data-tbl td.left { text-align:left; }
table.data-tbl td.center { text-align:center; }
table.data-tbl .row-total { background:#EDF1F7; font-weight:700; }
.pct-up { color:#E53935; font-weight:700; font-size:1rem; }
.pct-down { color:#1E88E5; font-weight:700; font-size:1rem; }
.row-total td { font-weight:800; }
tr.subtotal-depth0 { background:#0F1B3D !important; }
tr.subtotal-depth0 td { color:#fff !important; font-weight:700; }

/* ========== CHART ========== */
.chart-container { position:relative; width:100%; height:720px; }
canvas { height:680px !important; }
.s3-body { display:flex; position:relative; }
.s3-y-axis { display:none; }
.s3-scroll { flex:1; min-width:0; }
.chart-day-btn {
  font-family:'Noto Sans KR',sans-serif; font-size:.85rem; font-weight:500; padding:6px 16px;
  border:1px solid #CDD1D9; border-radius:6px; background:#fff; color:#666; cursor:pointer;
  transition:all .2s; margin-right:8px;
}
.chart-day-btn:hover { border-color:#4A90D9; color:#4A90D9; }
.chart-day-btn.active { background:#1B2E5C; color:#fff; border-color:#1B2E5C; font-weight:700; }

/* ========== LOADING ========== */
.loading-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:500; align-items:center; justify-content:center; flex-direction:column; }
.loading-overlay.show { display:flex; }
.spinner { border:4px solid #f3f3f3; border-top:4px solid #4A90D9; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin-bottom:16px; }
@keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
.loading-text { color:#fff; font-size:1rem; font-weight:500; }
.error-box { background:#FFF3CD; border:1px solid #FFB81C; border-radius:8px; padding:16px; color:#333; margin-bottom:20px; display:none; }
.error-box.show { display:block; }
.error-box .error-title { font-weight:700; margin-bottom:8px; }
.error-box button { background:#FFB81C; color:#000; border:none; padding:8px 16px; border-radius:4px; cursor:pointer; font-weight:600; }

/* ========== PASSWORD ========== */
#pw-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; }
#pw-overlay h2 { color:#fff; font-size:22px; margin-bottom:20px; font-weight:600; }
#pw-overlay input { padding:12px 20px; font-size:16px; border:2px solid #475569; border-radius:8px; background:#1e293b; color:#fff; width:260px; text-align:center; outline:none; }
#pw-overlay input:focus { border-color:#3b82f6; }
#pw-overlay .pw-btn { margin-top:14px; padding:10px 36px; font-size:15px; background:#3b82f6; color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:600; }
#pw-overlay .pw-msg { color:#ef4444; margin-top:10px; font-size:13px; min-height:20px; }

/* ========== MOBILE (<=768px) ========== */
@media(max-width:768px) {
  html { font-size:15px; }
  .header { padding:12px 12px 0; }
  .header-top { padding-bottom:8px; }
  .logo { font-size:1.2rem; }
  .header-date { font-size:.85rem; }
  .content { padding:12px 8px 32px; }
  .section { border-radius:8px; margin-bottom:12px; }
  .section-header { padding:12px 14px; font-size:1rem; flex-wrap:wrap; gap:6px; }
  .section-header .badge { font-size:.72rem; padding:3px 8px; }
  .section-body { padding:12px 10px; overflow-x:auto; -webkit-overflow-scrolling:touch; }

  .s1-desktop { display:none; }
  .s1-mobile { display:block; }
  .summary-label { font-size:.95rem; margin-bottom:8px; }

  table.data-tbl { min-width:750px; border-collapse:separate; border-spacing:0; }
  table.data-tbl th, table.data-tbl td { padding:8px 10px; font-size:.95rem; border:none; border-right:1px solid #D8DCE3; border-bottom:1px solid #D8DCE3; }
  table.data-tbl thead tr:first-child th { border-top:1px solid #D8DCE3; }
  table.data-tbl th:first-child, table.data-tbl td:first-child { border-left:1px solid #D8DCE3; }

  .scol { position:sticky; z-index:2; }
  .scol-1 { left:0; min-width:60px; }
  th.scol { z-index:3; background:#F5F7FA; }
  td.scol { background:#fff; }
  tr.row-total td.scol { background:#EDF1F7; }
  tr.subtotal-depth0 td.scol { background:#0F1B3D !important; }
  .scol { border-right:1px solid #C0C5CE !important; }
  .scol-1::after { content:''; position:absolute; top:0; right:-6px; bottom:0; width:6px; background:linear-gradient(to right,rgba(0,0,0,.1),transparent); pointer-events:none; }

  .s3-body.section-body { display:block !important; overflow-x:auto !important; -webkit-overflow-scrolling:touch; padding:10px; }
  .s3-y-axis { display:none !important; }
  .s3-scroll { width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .s3-scroll .chart-container { width:1800px; min-width:1800px; height:350px; }
  .chart-day-btn { font-size:.88rem; padding:6px 14px; }
}
@media(max-width:420px) {
  .header { padding:8px 8px 0; }
  .logo { font-size:1.1rem; }
  .section-header { padding:10px; font-size:.95rem; }
  .section-body { padding:8px 6px; }
  .mc-grid { gap:6px; }
  .mc-card { padding:9px; }
  .mc-title { font-size:.82rem; }
  .mc-row { font-size:.82rem; }
  .mk-hero-value { font-size:1.4rem; }
  .mk-sub-value { font-size:1rem; }
  table.data-tbl { min-width:650px; }
  table.data-tbl th, table.data-tbl td { font-size:.88rem; padding:7px 8px; }
  .s3-scroll .chart-container { min-width:1400px; height:380px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo"><b>BNOTE</b> 주간 매출 현황</div>
    <div class="header-date" id="headerDate">-</div>
  </div>
</div>

<div class="content">
  <div class="error-box" id="errorBox">
    <div class="error-title">데이터 로드 실패</div>
    <div class="error-msg" id="errorMsg"></div>
    <button onclick="retryLoadData()">다시 시도</button>
  </div>
  <div id="s1-section"></div>
  <div id="s2-section"></div>
  <div id="s3-section"></div>
  <div id="s4-section"></div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">데이터 로딩 중...</div>
</div>

<div id="pw-overlay">
  <h2>BNOTE Dashboard</h2>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" autofocus>
  <button class="pw-btn" onclick="checkPw()">확인</button>
  <div class="pw-msg" id="pw-msg"></div>
</div>

<script>
const DATA_URL='https://raw.githubusercontent.com/wonsosw-cmd/bnote-weekly-report/main/data.json';
const GAS_URL='https://script.google.com/macros/s/AKfycbwmWK2sGAv-kQoQEzcEoaw9q7Fhf3FQBv0Ug9ryjkXnxRzDgbuHWh-LR1wfzuhydK8odA/exec';
const DEFAULT_CONVERSION_RATE=0.8636364;
const FETCH_TIMEOUT=8000;
let allData=null, refDate=null, currentMonth=3, currentYear=2026, chartDay='tue', s3ChartInstance=null;

/* ===== PASSWORD ===== */
function calculateRefDate(now){
  const day=now.getDay(), d=new Date(now);
  if(day>=2&&day<=4){d.setDate(d.getDate()-(day-1));}
  else{const diff=(day>=5)?(day-4):(day+3);d.setDate(d.getDate()-diff);}
  d.setHours(0,0,0,0); return d;
}
function calculatePassword(rd){
  const seed=rd.getFullYear()*10000+(rd.getMonth()+1)*100+rd.getDate();
  let hash='',s=seed;
  for(let i=0;i<8;i++){s=(s*16807+12345)&0x7FFFFFFF;hash+=String.fromCharCode(65+(s%26));}
  return 'BN'+hash.substring(0,3)+'!'+(rd.getMonth()+1);
}
function checkPw(){
  const input=document.getElementById('pw-input').value;
  if(input===calculatePassword(refDate)){
    document.getElementById('pw-overlay').style.display='none';
    showLoading(true); loadData(); return;
  }
  document.getElementById('pw-msg').textContent='비밀번호가 틀렸습니다.';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-input').focus();
}
document.addEventListener('DOMContentLoaded',function(){
  refDate=calculateRefDate(new Date());
  currentMonth=refDate.getMonth()+1;
  currentYear=refDate.getFullYear();
  const opts={year:'numeric',month:'long',day:'numeric'};
  document.getElementById('headerDate').textContent=refDate.toLocaleDateString('ko-KR',opts)+' 기준';
  document.getElementById('pw-input').addEventListener('keydown',function(e){if(e.key==='Enter')checkPw();});
});

/* ===== UTILITY ===== */
function fmt(n){if(n==null)return'-';if(typeof n==='string')n=parseFloat(n);if(isNaN(n))return'-';return Math.round(n).toLocaleString('ko-KR');}
function pctClass(v){const n=parseFloat(v);if(isNaN(n))return'';return n>=100?'pct-up':'pct-down';}

/* ===== LOADING ===== */
function showLoading(s){document.getElementById('loadingOverlay').classList.toggle('show',s);}
function showError(m){document.getElementById('errorMsg').textContent=m;document.getElementById('errorBox').classList.add('show');}
function hideError(){document.getElementById('errorBox').classList.remove('show');}
async function loadData(){
  hideError();
  // 1차: GitHub data.json (빠름, ~1초)
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now());
    if(r.ok){allData=await r.json();renderAllSections();showLoading(false);return;}
  }catch(e){console.warn('GitHub fetch failed, trying GAS...',e);}
  // 2차 fallback: GAS (느림)
  try{
    const c=new AbortController(),id=setTimeout(()=>c.abort(),FETCH_TIMEOUT);
    const r=await fetch(GAS_URL,{signal:c.signal});clearTimeout(id);
    if(!r.ok)throw new Error('HTTP '+r.status);
    allData=await r.json();renderAllSections();
  }catch(e){console.error(e);showError('데이터 로딩 실패: '+e.message);}
  finally{showLoading(false);}
}
function retryLoadData(){showLoading(true);loadData();}

/* ===== CHANNEL CONVERSION RATES ===== */
function buildChannelRates(){
  const plan=allData.plan||[],rates={};
  for(let r=33;r<plan.length;r++){
    const ch=String(plan[r][1]||'').trim();if(!ch)continue;
    let rate=plan[r][currentMonth+3];
    if(typeof rate==='string'){rate=parseFloat(rate.replace('%','').replace(/,/g,''));if(!isNaN(rate)&&rate>1)rate/=100;}
    else if(typeof rate==='number'&&rate>1)rate/=100;
    if(rate&&!isNaN(rate)&&rate>0)rates[ch]=rate;
  }
  return rates;
}
function getChannelRate(rates,ch){
  if(rates[ch]!==undefined)return rates[ch];
  const plan=allData.plan||[];
  let ht=0,gt=0;
  if(plan.length>18&&plan[18].length>currentMonth+3){const v=plan[18][currentMonth+3];ht=typeof v==='string'?parseFloat(v.replace(/,/g,'')):v||0;}
  if(plan.length>3&&plan[3].length>currentMonth+3){const v=plan[3][currentMonth+3];gt=typeof v==='string'?parseFloat(v.replace(/,/g,'')):v||0;}
  if(ht>0&&gt>0)return ht/gt;
  return DEFAULT_CONVERSION_RATE;
}

/* ===== S1: MONTHLY SUMMARY ===== */
function renderSection1(){
  if(!allData||!allData.rows){document.getElementById('s1-section').innerHTML='';return;}
  const rows=allData.rows||[],plan=allData.plan||[],channels=allData.channels||[];
  const M=currentMonth,refDay=refDate.getDate(),dateStr=M+'/1~'+M+'/'+refDay;
  const chRates=buildChannelRates();

  let geo_cum=0,hw_cum=0;
  rows.forEach(row=>{
    const d=new Date(row.d);
    if(d.getMonth()===M-1&&d.getFullYear()===currentYear){
      (row.v||[]).forEach((val,idx)=>{
        geo_cum+=val;
        hw_cum+=val*getChannelRate(chRates,channels[idx]||'');
      });
    }
  });
  hw_cum=Math.round(hw_cum);

  let geo_tgt=0,hw_tgt=0;
  if(plan.length>3&&plan[3].length>M+3){const v=plan[3][M+3];geo_tgt=typeof v==='string'?parseFloat(v.replace(/,/g,'')):v||0;}
  if(plan.length>18&&plan[18].length>M+3){const v=plan[18][M+3];hw_tgt=typeof v==='string'?parseFloat(v.replace(/,/g,'')):v||0;}
  const geo_prog=geo_tgt>0?Math.round(geo_cum/geo_tgt*100):0;
  const hw_prog=hw_tgt>0?Math.round(hw_cum/hw_tgt*100):0;

  function getMS(mn,yr){
    let g=0,h=0;
    rows.forEach(row=>{const d=new Date(row.d);if(d.getFullYear()===yr&&d.getMonth()===mn-1){(row.v||[]).forEach((val,idx)=>{g+=val;h+=val*getChannelRate(chRates,channels[idx]||'');});}});
    return{g,h:Math.round(h)};
  }

  const pm1=M>1?M-1:12,pm1y=M>1?currentYear:currentYear-1;
  const pm2=M>2?M-2:12+(M-2),pm2y=M>2?currentYear:currentYear-1;
  const pm3=M>3?M-3:12+(M-3),pm3y=M>3?currentYear:currentYear-1;
  const m1=getMS(pm1,pm1y),m2=getMS(pm2,pm2y),m3=getMS(pm3,pm3y),ly=getMS(M,currentYear-1);
  const gp=(c,r)=>r>0?Math.round(c/r*100):0;

  function makeCard(label,cum,pct){
    return '<div class="mc-card"><div class="mc-title">'+label+'</div>'+
      '<div class="mc-row"><span class="mc-label">누계</span><span class="mc-val">'+fmt(cum)+'</span></div>'+
      '<div class="mc-row"><span class="mc-label">동기비</span><span class="mc-val '+pctClass(pct)+'">'+pct+'%</span></div></div>';
  }

  function makeTable(title,cum,tgt,prog,unit,c1,c2,c3,cly){
    const p1=gp(cum,c1),p2=gp(cum,c2),p3=gp(cum,c3),ply=gp(cum,cly);
    const desktop='<div class="s1-desktop"><table class="summary"><tr>'+
      '<th style="width:18%;background:#0F1B3D;color:#fff;font-size:1rem;">'+M+'월 누계<br><span style="font-size:.75rem;font-weight:400">('+dateStr+')</span></th>'+
      '<td class="big-num" style="width:22%">'+fmt(cum)+'</td>'+
      '<th style="width:14%;background:#1B2E5C;color:#fff;">'+M+'월 '+unit+' 목표</th>'+
      '<td style="width:18%;font-weight:600;">'+fmt(tgt)+'</td>'+
      '<th style="width:10%;background:#4A90D9;color:#fff;">진도율</th>'+
      '<td style="width:18%;font-weight:700;font-size:1.3rem;" class="'+(prog>=100?'pct-up':'pct-down')+'">'+prog+'%</td></tr></table>'+
      '<table class="summary" style="margin-top:-1px;"><tr>'+
      '<td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">'+
        '<div class="row-item"><span class="label">'+pm1+'월 누계</span><span class="value">'+fmt(c1)+'</span></div>'+
        '<div class="row-item pct"><span class="label">'+pm1+'월 동기비</span><span class="value '+pctClass(p1)+'">'+p1+'%</span></div></td>'+
      '<td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">'+
        '<div class="row-item"><span class="label">'+pm2+'월 누계</span><span class="value">'+fmt(c2)+'</span></div>'+
        '<div class="row-item pct"><span class="label">'+pm2+'월 동기비</span><span class="value '+pctClass(p2)+'">'+p2+'%</span></div></td>'+
      '<td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">'+
        '<div class="row-item"><span class="label">'+pm3+'월 누계</span><span class="value">'+fmt(c3)+'</span></div>'+
        '<div class="row-item pct"><span class="label">'+pm3+'월 동기비</span><span class="value '+pctClass(p3)+'">'+p3+'%</span></div></td>'+
      '<td class="sub-cell" style="width:25%;">'+
        '<div class="row-item"><span class="label">25\' '+M+'월 누계</span><span class="value">'+fmt(cly)+'</span></div>'+
        '<div class="row-item pct"><span class="label">25\' 동기비</span><span class="value '+pctClass(ply)+'">'+ply+'%</span></div></td>'+
      '</tr></table></div>';

    const mobile='<div class="s1-mobile"><div class="mk-hero">'+
      '<div class="mk-hero-label">'+M+'월 누계 <span>('+dateStr+')</span></div>'+
      '<div class="mk-hero-value">'+fmt(cum)+'</div></div>'+
      '<div class="mk-sub-row"><div class="mk-sub-item"><div class="mk-sub-label">'+M+'월 '+unit+' 목표</div><div class="mk-sub-value">'+fmt(tgt)+'</div></div>'+
      '<div class="mk-sub-item mk-progress"><div class="mk-sub-label">진도율</div><div class="mk-sub-value '+(prog>=100?'pct-up':'pct-down')+'">'+prog+'%</div></div></div>'+
      '<div class="mc-grid">'+makeCard(pm1+'월',c1,p1)+makeCard(pm2+'월',c2,p2)+makeCard(pm3+'월',c3,p3)+makeCard('25\' '+M+'월',cly,ply)+'</div></div>';

    return '<div class="summary-wrap"><div class="summary-label">'+title+' <span style="color:#888;font-weight:400;font-size:.82rem">(단위: 원)</span></div>'+desktop+mobile+'</div>';
  }

  document.getElementById('s1-section').innerHTML=
    '<div class="section"><div class="section-header"><div class="section-header-left"><span>1. 당월('+M+'월) 현황</span><span class="badge">SUMMARY</span></div></div><div class="section-body">'+
    makeTable('1-1. '+M+'월 매출액 현황 (회계기준)',hw_cum,hw_tgt,hw_prog,'매출액',m1.h,m2.h,m3.h,ly.h)+
    makeTable('1-2. '+M+'월 거래액 현황',geo_cum,geo_tgt,geo_prog,'거래액',m1.g,m2.g,m3.g,ly.g)+
    '</div></div>';
}

/* ===== S2: DAILY TRANSPOSED ===== */
function renderSection2(){
  if(!allData||!allData.rows){document.getElementById('s2-section').innerHTML='';return;}
  const rows=allData.rows||[],dayN=['(일)','(월)','(화)','(수)','(목)','(금)','(토)'];
  const rds=refDate.getFullYear()+'-'+String(refDate.getMonth()+1).padStart(2,'0')+'-'+String(refDate.getDate()).padStart(2,'0');
  const fr=rows.filter(r=>r.d<=rds),last=fr.slice(-7),prev=fr.length>14?fr.slice(-14,-7):[];
  if(!last.length){document.getElementById('s2-section').innerHTML='';return;}

  let h='<table class="data-tbl"><thead><tr><th class="scol scol-1">주차</th>';
  last.forEach(r=>{const d=new Date(r.d);h+='<th>'+(d.getMonth()+1)+'.'+d.getDate()+dayN[d.getDay()]+'</th>';});
  h+='<th style="background:#E8EBF0;">TOTAL</th></tr></thead><tbody>';

  let gt=0;
  h+='<tr class="row-total"><td class="center scol scol-1">금주</td>';
  last.forEach(r=>{const s=(r.v||[]).reduce((a,b)=>a+b,0);gt+=s;h+='<td>'+fmt(s)+'</td>';});
  h+='<td class="row-total">'+fmt(gt)+'</td></tr>';

  let pt=0;
  h+='<tr class="row-total"><td class="center scol scol-1">전주</td>';
  last.forEach((r,i)=>{const pr=prev.length>i?prev[i]:null;const s=pr?(pr.v||[]).reduce((a,b)=>a+b,0):0;pt+=s;h+='<td>'+fmt(s)+'</td>';});
  h+='<td class="row-total">'+fmt(pt)+'</td></tr>';

  h+='<tr class="row-total" style="border-top:2px solid #1B2E5C;"><td class="center scol scol-1">전주비</td>';
  last.forEach((r,i)=>{
    const s=(r.v||[]).reduce((a,b)=>a+b,0);
    const pr=prev.length>i?prev[i]:null;const ps=pr?(pr.v||[]).reduce((a,b)=>a+b,0):0;
    if(ps===0&&s===0){h+='<td class="center">-</td>';}
    else{const p=ps>0?Math.round(s/ps*100):100;h+='<td class="center '+(p>=100?'pct-up':'pct-down')+'">'+p+'%</td>';}
  });
  const tp=pt>0?Math.round(gt/pt*100):0;
  h+='<td class="center '+(tp>=100?'pct-up':'pct-down')+'">'+(pt===0?'-':tp+'%')+'</td></tr></tbody></table>';

  document.getElementById('s2-section').innerHTML=
    '<div class="section"><div class="section-header"><div class="section-header-left"><span>2. 일별 거래액 현황 (최근 7일)</span><span class="badge">DAILY</span></div></div><div class="section-body">'+h+'</div></div>';
}

/* ===== S3: CHART ===== */
function setChartDay(day){chartDay=day;document.querySelectorAll('.chart-day-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderSection3();}

function renderSection3(){
  if(!allData||!allData.rows)return;
  const rows=allData.rows||[],weeks={};
  rows.forEach(row=>{
    const wk=chartDay==='tue'?row.tw:row.fw;if(!wk)return;
    if(!weeks[wk])weeks[wk]={2024:0,2025:0,2026:0};
    const y=new Date(row.d).getFullYear(),s=(row.v||[]).reduce((a,b)=>a+b,0);
    if(weeks[wk][y]!==undefined)weeks[wk][y]+=s;
  });
  const labels=[];for(let w=1;w<=52;w++)labels.push('W'+w);
  const d24=labels.map(w=>weeks[w]?weeks[w][2024]/1e6:0);
  const d25=labels.map(w=>weeks[w]?weeks[w][2025]/1e6:0);
  const d26=labels.map(w=>weeks[w]?weeks[w][2026]/1e6:0);

  const rds=refDate.getFullYear()+'-'+String(refDate.getMonth()+1).padStart(2,'0')+'-'+String(refDate.getDate()).padStart(2,'0');
  const cwr=rows.find(r=>r.d===rds);
  const cwl=cwr?(chartDay==='tue'?cwr.tw:cwr.fw):null;
  const ci=cwl?parseInt(cwl.substring(1))-1:-1;
  const c26=labels.map((_,i)=>i===ci?'#E53935':'rgba(26,75,150,0.85)');
  const b26=labels.map((_,i)=>i===ci?'#B71C1C':'rgba(26,75,150,1)');

  document.getElementById('s3-section').innerHTML=
    '<div class="section"><div class="section-header"><div class="section-header-left"><span>3. \'24~\'26 주차별 거래액 추이</span><span class="badge">WEEKLY TREND</span></div>'+
    '<div><button class="chart-day-btn '+(chartDay==='tue'?'active':'')+'" onclick="setChartDay(\'tue\')">화요일 기준</button>'+
    '<button class="chart-day-btn '+(chartDay==='fri'?'active':'')+'" onclick="setChartDay(\'fri\')">금요일 기준</button></div></div>'+
    '<div class="section-body s3-body"><div class="s3-y-axis" id="s3YAxis"></div><div class="s3-scroll"><div class="chart-container"><canvas id="s3Chart"></canvas></div></div></div></div>';

  const isMob=window.innerWidth<=768;
  const ctx=document.getElementById('s3Chart').getContext('2d');
  if(s3ChartInstance)s3ChartInstance.destroy();
  // 모바일: fixed canvas, 데스크톱: responsive
  const canvas=document.getElementById('s3Chart');
  if(isMob){canvas.width=1800;canvas.height=350;canvas.style.width='1800px';canvas.style.height='350px';}

  s3ChartInstance=new Chart(ctx,{type:'bar',data:{labels:labels,datasets:[
    {label:'2024',data:d24,backgroundColor:'rgba(200,210,220,0.6)',borderColor:'rgba(160,170,180,0.8)',borderWidth:1},
    {label:'2025',data:d25,backgroundColor:'rgba(100,160,220,0.55)',borderColor:'rgba(80,140,200,0.8)',borderWidth:1},
    {label:'2026',data:d26,backgroundColor:c26,borderColor:b26,borderWidth:1}
  ]},options:{responsive:!isMob,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{
    legend:{position:'top',labels:{font:{family:'Noto Sans KR',size:12},usePointStyle:true,
      generateLabels:function(chart){return chart.data.datasets.map((d,i)=>({text:d.label,
        fillStyle:i===0?'rgba(200,210,220,0.6)':i===1?'rgba(100,160,220,0.55)':'rgba(26,75,150,0.85)',
        strokeStyle:i===0?'rgba(160,170,180,0.8)':i===1?'rgba(80,140,200,0.8)':'rgba(26,75,150,1)',
        lineWidth:1,datasetIndex:i,hidden:!chart.isDatasetVisible(i)}));}}},
    tooltip:{callbacks:{label:c=>c.dataset.label+': '+(c.parsed.y?c.parsed.y.toFixed(0):'-')+'백만원'}}},
    scales:{x:{grid:{display:false},ticks:{font:{family:'Noto Sans KR',size:10},maxRotation:60,minRotation:45,color:function(c){return c.index===ci?'#E53935':'#666';}}},
    y:{beginAtZero:true,display:true,ticks:{font:{family:'Noto Sans KR',size:11},callback:v=>v.toFixed(0)+''},title:{display:true,text:'백만원',font:{family:'Noto Sans KR',size:11}}}}}});

}

/* ===== S4: CHANNEL DATA (zero-channel hiding) ===== */
function renderSection4(){
  if(!allData||!allData.rows||!allData.channels){document.getElementById('s4-section').innerHTML='';return;}
  const rows=allData.rows||[],channels=allData.channels||[],dayN=['(일)','(월)','(화)','(수)','(목)','(금)','(토)'];
  const rds=refDate.getFullYear()+'-'+String(refDate.getMonth()+1).padStart(2,'0')+'-'+String(refDate.getDate()).padStart(2,'0');
  const fr=rows.filter(r=>r.d<=rds),last=fr.slice(-7),prev=fr.length>14?fr.slice(-14,-7):[];

  let dates=[];
  last.forEach(r=>{const d=new Date(r.d);dates.push((d.getMonth()+1)+'.'+d.getDate()+dayN[d.getDay()]);});

  const chData=[];
  channels.slice(0,17).forEach((ch,idx)=>{
    let cs=0,ps=0;const dv=[];
    for(let i=0;i<last.length;i++){const v=(last[i]&&last[i].v&&last[i].v[idx]!=null)?last[i].v[idx]:0;dv.push(v);cs+=v;}
    for(let i=0;i<prev.length;i++){const v=(prev[i]&&prev[i].v&&prev[i].v[idx]!=null)?prev[i].v[idx]:0;ps+=v;}
    if(cs===0&&ps===0)return; // 금주+전주 모두 0이면 숨김
    const pct=ps>0?Math.round(cs/ps*100):null;
    chData.push({name:ch,dv:dv,cs:cs,ps:ps,pct:pct});
  });

  let h='<table class="data-tbl"><thead><tr><th class="scol scol-1" style="min-width:100px;">채널</th>';
  dates.forEach(d=>h+='<th>'+d+'</th>');
  h+='<th>합계</th><th>전주합계</th><th>전주비</th></tr></thead><tbody>';

  chData.forEach(ch=>{
    const ps=ch.pct===null?'-':(ch.pct>=100?'<span class="pct-up">'+ch.pct+'%</span>':'<span class="pct-down">'+ch.pct+'%</span>');
    h+='<tr><td class="left scol scol-1" style="font-weight:600;">'+ch.name+'</td>';
    ch.dv.forEach(v=>h+='<td>'+fmt(v)+'</td>');
    h+='<td class="row-total">'+fmt(ch.cs)+'</td><td>'+fmt(ch.ps)+'</td><td class="center">'+ps+'</td></tr>';
  });

  // Total (ALL channels incl. hidden zeros)
  let ts=0,tps=0;const td=[];
  for(let i=0;i<last.length;i++){const s=(last[i]&&last[i].v)?last[i].v.reduce((a,b)=>a+(b||0),0):0;td.push(s);ts+=s;}
  for(let i=0;i<prev.length;i++){tps+=(prev[i]&&prev[i].v)?prev[i].v.reduce((a,b)=>a+(b||0),0):0;}
  const tpct=tps>0?Math.round(ts/tps*100):null;
  h+='<tr class="subtotal-depth0"><td class="scol scol-1" style="font-weight:700;">전체</td>';
  td.forEach(v=>h+='<td>'+fmt(v)+'</td>');
  h+='<td>'+fmt(ts)+'</td><td>'+fmt(tps)+'</td><td class="center">'+(tpct===null?'-':tpct+'%')+'</td></tr></tbody></table>';

  document.getElementById('s4-section').innerHTML=
    '<div class="section"><div class="section-header"><div class="section-header-left"><span>4. 채널별 거래액 현황 (최근 7일)</span><span class="badge">CHANNEL</span></div></div><div class="section-body">'+h+'</div></div>';
}

/* ===== MAIN ===== */
function renderAllSections(){renderSection1();renderSection2();renderSection3();renderSection4();}
</script>
