<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNOTE 주간 매출 현황 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ========== RESET & GLOBAL ========== */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:15px; }
body {
  font-family:'Noto Sans KR', sans-serif;
  background:#F0F2F5;
  color:#1a1a1a;
  min-height:100vh;
}

/* ========== HEADER ========== */
.header {
  background:linear-gradient(135deg, #0F1B3D 0%, #1B2E5C 100%);
  padding:24px 32px 0;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}
.header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:16px;
}
.logo {
  font-size:1.5rem; font-weight:900; color:#fff; letter-spacing:1px;
}
.logo b { color:#4A90D9; }
.header-date {
  color:rgba(255,255,255,.6); font-size:.85rem;
}

/* ========== CONTENT ========== */
.content { max-width:1400px; margin:0 auto; padding:24px 24px 48px; }

/* ========== SECTION ========== */
.section {
  background:#fff; border-radius:12px; margin-bottom:20px;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  overflow:hidden;
}
.section-header {
  padding:16px 24px; font-size:1.1rem; font-weight:700; color:#0F1B3D;
  border-bottom:2px solid #E8EBF0;
  display:flex; align-items:center; gap:8px; justify-content:space-between;
}
.section-header-left {
  display:flex; align-items:center; gap:8px;
}
.section-header .badge {
  display:inline-block; background:#4A90D9; color:#fff; font-size:.7rem; font-weight:600;
  padding:2px 8px; border-radius:10px; letter-spacing:.5px;
}
.section-body { padding:20px 24px; overflow-x:auto; }

/* ========== SUMMARY TABLE (Section 1) ========== */
.summary-wrap { margin-bottom:24px; }
.summary-wrap:last-child { margin-bottom:0; }
.summary-label {
  font-size:.95rem; font-weight:600; color:#1B2E5C; margin-bottom:8px;
  padding-left:4px;
}

table.summary {
  width:100%; border-collapse:collapse;
}
table.summary th, table.summary td {
  border:1px solid #D8DCE3; padding:11px 14px; text-align:center;
  font-size:.9rem; vertical-align:middle;
}
table.summary th {
  background:#F5F7FA; font-weight:600; color:#1B2E5C;
}
.summary .big-num {
  font-size:1.45rem; font-weight:800; color:#0F1B3D;
}
.summary .highlight-blue {
  color:#4A90D9; font-weight:700; font-size:1.2rem;
}
.summary .sub-cell {
  text-align:left; padding:14px 16px; line-height:1;
}
.summary .sub-cell .row-item {
  display:flex; justify-content:space-between; align-items:center;
  font-size:.92rem; padding:6px 0;
}
.summary .sub-cell .row-item + .row-item {
  border-top:1px dashed #E0E3E8;
}
.summary .sub-cell .row-item .label {
  color:#666; font-size:.85rem; min-width:72px;
}
.summary .sub-cell .row-item .value {
  font-weight:700; color:#0F1B3D; font-size:1rem; text-align:right;
}
.summary .sub-cell .row-item.pct .value {
  font-size:.95rem; font-weight:700;
}
.summary .sub-cell .row-item.pct .value.pct-up { color:#E53935; }
.summary .sub-cell .row-item.pct .value.pct-down { color:#1E88E5; }

/* ========== DATA TABLE ========== */
table.data-tbl {
  width:100%; border-collapse:collapse; white-space:nowrap;
}
table.data-tbl th, table.data-tbl td {
  border:1px solid #D8DCE3; padding:9px 11px; font-size:.88rem;
  vertical-align:middle;
}
table.data-tbl th {
  background:#F5F7FA; font-weight:600; color:#1B2E5C; text-align:center;
}
table.data-tbl td { text-align:right; }
table.data-tbl td.left { text-align:left; }
table.data-tbl td.center { text-align:center; }
table.data-tbl .row-brand {
  background:#FAFBFC; font-weight:600; color:#0F1B3D;
}
table.data-tbl .row-sub { background:#fff; }
table.data-tbl .row-total {
  background:#EDF1F7; font-weight:700;
}
.pct-up { color:#E53935; font-weight:600; }
.pct-down { color:#1E88E5; font-weight:600; }
.row-depth0 td:first-child { font-weight:700; color:#0F1B3D; }
.row-depth1 td.left { padding-left:20px; font-weight:600; }
.row-depth2 td.left { padding-left:36px; font-weight:500; color:#444; }
.row-depth3 td.left { padding-left:52px; color:#555; }

/* ========== SUBTOTAL ROW COLORS ========== */
tr.subtotal-depth0 { background:#0F1B3D !important; }
tr.subtotal-depth0 td { color:#fff !important; font-weight:700; }
tr.subtotal-depth0 td.pct-up { color:#FF8A80 !important; }
tr.subtotal-depth0 td.pct-down { color:#82B1FF !important; }

/* ========== CHART ========== */
.chart-container {
  position:relative; width:100%; height:400px;
}
.s3-body { display:flex; position:relative; }
.s3-scroll { flex:1; min-width:0; }
.chart-day-btn {
  font-family:'Noto Sans KR', sans-serif;
  font-size:.82rem; font-weight:500; padding:6px 16px;
  border:1px solid #CDD1D9; border-radius:6px;
  background:#fff; color:#666; cursor:pointer;
  transition:all .2s; margin-right:8px;
}
.chart-day-btn:hover { border-color:#4A90D9; color:#4A90D9; }
.chart-day-btn.active {
  background:#1B2E5C; color:#fff; border-color:#1B2E5C; font-weight:700;
}

/* ========== LOADING SPINNER ========== */
.loading-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.3); z-index:500; align-items:center; justify-content:center;
  flex-direction:column;
}
.loading-overlay.show { display:flex; }
.spinner {
  border:4px solid #f3f3f3;
  border-top:4px solid #4A90D9;
  border-radius:50%;
  width:40px; height:40px;
  animation:spin 1s linear infinite;
  margin-bottom:16px;
}
@keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
.loading-text { color:#fff; font-size:1rem; font-weight:500; }

/* ========== ERROR MESSAGE ========== */
.error-box {
  background:#FFF3CD; border:1px solid #FFB81C; border-radius:8px;
  padding:16px; color:#333; margin-bottom:20px; display:none;
}
.error-box.show { display:block; }
.error-box .error-title { font-weight:700; margin-bottom:8px; }
.error-box .error-msg { font-size:.9rem; margin-bottom:12px; }
.error-box button {
  background:#FFB81C; color:#000; border:none; padding:8px 16px;
  border-radius:4px; cursor:pointer; font-weight:600;
}
.error-box button:hover { background:#FF9800; }

/* ========== RESPONSIVE ========== */
@media(max-width:1024px) {
  .content { max-width:100%; padding:20px 16px 40px; }
  .section-body { padding:16px; }
  table.summary th, table.summary td { padding:8px 10px; font-size:.8rem; }
  .summary .big-num { font-size:1.15rem; }
}

@media(max-width:768px) {
  html { font-size:15px; }
  .header { padding:12px 12px 0; }
  .header-top { padding-bottom:8px; }
  .logo { font-size:1.2rem; }
  .header-date { font-size:.85rem; }
  .content { padding:12px 8px 32px; }
  .section { border-radius:8px; margin-bottom:12px; }
  .section-header { padding:12px 14px; font-size:1rem; }
  .section-body { padding:12px 10px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  table.data-tbl { min-width:650px; }
  table.data-tbl th, table.data-tbl td { font-size:.88rem; padding:7px 8px; }
  .chart-container { height:380px; }
}

/* ========== EASTEND-MATCHED SIZE OVERRIDES ========== */
html{font-size:16px !important}
body{font-size:16px !important}
.header{padding:24px 32px 0 !important}
.header-date{font-size:1rem !important;font-weight:600 !important;color:rgba(255,255,255,.7) !important}

/* ========== PASSWORD OVERLAY ========== */
#pw-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#000; z-index:9999;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
}
#pw-overlay h2 {
  color:#fff; font-size:22px; margin-bottom:20px; font-weight:600;
}
#pw-overlay input {
  padding:12px 20px; font-size:16px;
  border:2px solid #475569; border-radius:8px;
  background:#1e293b; color:#fff; width:260px; text-align:center;

}
#pw-overlay input:focus { border-color:#3b82f6; }
#pw-overlay .pw-btn {
  margin-top:14px; padding:10px 36px; font-size:15px;

</style>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="logo"><b>BNOTE</b> 주간 매출 현황</div>

</div>

<!-- CONTENT -->
<div class="content">

  <div class="error-box" id="errorBox">

  <div class="section" id="s1-section">

  <div class="section" id="s2-section">
    <div class="section-header">
      <div class="section-header-left">
        <span>2. 일별 거래액 현황 (최근 7일)</span>

      </div>
      <div>
        <button class="chart-day-btn active" onclick="setChartDay('tue')">화요일 기준</button>
        <button class="chart-day-btn" onclick="setChartDay('fri')">금요일 기준</button>

        <span class="badge">상세</span>

</div>

<!-- LOADING OVERLAY -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">GAS 서버 데이터 로딩 중... (최대 30초)</div>
</div>

<!-- PASSWORD OVERLAY -->
<div id="pw-overlay">
  <h2>BNOTE Dashboard</h2>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" autofocus>
  <button class="pw-btn" onclick="checkPw()">확인</button>
  <div class="pw-msg" id="pw-msg"></div>
</div>

<script>
// ============================================================
// GLOBAL CONFIG & DATA
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwmWK2sGAv-kQoQEzcEoaw9q7Fhf3FQBv0Ug9ryjkXnxRzDgbuHWh-LR1wfzuhydK8odA/exec';
const DEFAULT_CONVERSION_RATE = 0.8636364;
const FETCH_TIMEOUT = 30000;

let allData = null;
let refDate = null;
let currentMonth = 3;
let currentYear = 2026;
let chartDay = 'tue';
let s3ChartInstance = null;

// ============================================================
// PASSWORD SYSTEM
// ============================================================
function calculateRefDate(now) {
  const day = now.getDay();
  const d = new Date(now);
  if (day >= 2 && day <= 4) {
    d.setDate(d.getDate() - (day - 1));
  } else {
    const diff = (day >= 5) ? (day - 4) : (day + 3);
    d.setDate(d.getDate() - diff);
  }
  d.setHours(0, 0, 0, 0);
  return d;
}

function calculatePassword(refDate) {
  const seed = refDate.getFullYear() * 10000 +
               (refDate.getMonth() + 1) * 100 +
               refDate.getDate();
  let hash = '';
  let s = seed;
  for (let i = 0; i < 8; i++) {
    s = (s * 16807 + 12345) & 0x7FFFFFFF;
    hash += String.fromCharCode(65 + (s % 26));
  }
  const month = refDate.getMonth() + 1;
  return 'BN' + hash.substring(0, 3) + '!' + month;
}

function checkPw() {
  const input = document.getElementById('pw-input').value;
  const correct = calculatePassword(refDate);

  if (input === correct) {
    document.getElementById('pw-overlay').style.display = 'none';
    showLoading(true);
    loadData();
    return;
  }

  document.getElementById('pw-msg').textContent = '비밀번호가 틀렸습니다.';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').focus();
}

document.addEventListener('DOMContentLoaded', function() {
  refDate = calculateRefDate(new Date());
  currentMonth = refDate.getMonth() + 1;
  currentYear = refDate.getFullYear();
  updateHeaderDate();

  const pwInput = document.getElementById('pw-input');
  pwInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPw();
  });
});

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function updateHeaderDate() {
  const options = { year: 'numeric', month: 'long', day: 'numeric' };
  const dateStr = refDate.toLocaleDateString('ko-KR', options);
  document.getElementById('headerDate').textContent = dateStr;
}

function fmt(n) {
  if (n === null || n === undefined) return '-';
  if (typeof n === 'string') n = parseFloat(n);
  if (isNaN(n)) return '-';
  return Math.round(n).toLocaleString('ko-KR');
}

function fmtDecimal(n) {
  if (n === null || n === undefined) return '-';
  if (typeof n === 'string') n = parseFloat(n);
  if (isNaN(n)) return '-';
  return n.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
}

function pctClass(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '';
  return n >= 100 ? 'pct-up' : 'pct-down';
}

// ============================================================
// DATA LOADING
// ============================================================
function showLoading(show) {
  const overlay = document.getElementById('loadingOverlay');
  if (show) {
    overlay.classList.add('show');
  } else {
    overlay.classList.remove('show');
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  const msgEl = document.getElementById('errorMsg');
  msgEl.textContent = msg;
  box.classList.add('show');
}

function hideError() {
  document.getElementById('errorBox').classList.remove('show');
}

async function fetchWithTimeout(url, timeout = FETCH_TIMEOUT) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const resp = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return resp;
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function loadData() {
  hideError();

  try {
    const resp = await fetchWithTimeout(GAS_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    allData = await resp.json();
    renderAllSections();
  } catch (e) {
    console.error('Data load error:', e);
    showError('데이터 로딩에 실패했습니다: ' + e.message);
  } finally {
    showLoading(false);
  }
}

function retryLoadData() {
  showLoading(true);
  loadData();
}

// ============================================================
// SECTION 1: MONTHLY SUMMARY
// ============================================================
function renderSection1() {
  if (!allData || !allData.rows) {
    document.getElementById('s1-body').innerHTML = '데이터 없음';
    return;
  }

  const fixedDateStr = `${currentMonth}/1~${currentMonth}/${refDate.getDate()}`;
  const rows = allData.rows || [];
  const plan = allData.plan || [];

  // Calculate monthly cumulative for current month
  let geomyuk_cumulative = 0;
  rows.forEach(row => {
    if (new Date(row.d).getMonth() === currentMonth - 1) {
      const daySum = (row.v || []).reduce((a, b) => a + b, 0);
      geomyuk_cumulative += daySum;
    }
  });

  // Get targets from plan data
  // plan[3] = 거래액 TTL row
  // plan[18] = 회계 TTL row
  // Column index for current month = currentMonth + 3 (columns D onwards = months 1-12)
  let geomyuk_target = 10000000;
  let hwake_target = 8000000;

  if (plan.length > 3 && plan[3].length > currentMonth + 3) {
    const val = plan[3][currentMonth + 3];
    if (val) geomyuk_target = typeof val === 'string' ? parseFloat(val.toString().replace(/,/g, '')) : val;
  }

  if (plan.length > 18 && plan[18].length > currentMonth + 3) {
    const val = plan[18][currentMonth + 3];
    if (val) hwake_target = typeof val === 'string' ? parseFloat(val.toString().replace(/,/g, '')) : val;
  }

  // Calculate conversion rate and hwake cumulative
  let conversion_rate = DEFAULT_CONVERSION_RATE;
  if (hwake_target > 0 && geomyuk_target > 0) {
    conversion_rate = hwake_target / geomyuk_target;
  }

  const hwake_cumulative = Math.round(geomyuk_cumulative * conversion_rate);

  // Calculate progress rates
  const geomyuk_progress = geomyuk_target > 0 ? Math.round((geomyuk_cumulative / geomyuk_target) * 100) : 0;
  const hwake_progress = hwake_target > 0 ? Math.round((hwake_cumulative / hwake_target) * 100) : 0;

  // Previous month comparisons - actual data from rows
  function getMonthSum(monthNum, year) {
    let sum = 0;
    rows.forEach(row => {
      const d = new Date(row.d);
      if (d.getFullYear() === year && d.getMonth() === monthNum - 1) {
        sum += (row.v || []).reduce((a, b) => a + b, 0);
      }
    });
    return sum;
  }

  // m-1, m-2, 12월, 전년 동월
  const prevMonth1 = currentMonth > 1 ? currentMonth - 1 : 12;
  const prevMonth1Year = currentMonth > 1 ? currentYear : currentYear - 1;
  const prevMonth2 = currentMonth > 2 ? currentMonth - 2 : 12 + (currentMonth - 2);
  const prevMonth2Year = currentMonth > 2 ? currentYear : currentYear - 1;

  const m1_geomyuk = getMonthSum(prevMonth1, prevMonth1Year);
  const m2_geomyuk = getMonthSum(prevMonth2, prevMonth2Year);
  const m12_geomyuk = getMonthSum(12, currentYear - 1);
  const ly3_geomyuk = getMonthSum(currentMonth, currentYear - 1);

  const m1_hwake = Math.round(m1_geomyuk * conversion_rate);
  const m2_hwake = Math.round(m2_geomyuk * conversion_rate);
  const m12_hwake = Math.round(m12_geomyuk * conversion_rate);
  const ly3_hwake = Math.round(ly3_geomyuk * conversion_rate);

  const m1_geomyuk_pct = m1_geomyuk > 0 ? Math.round((geomyuk_cumulative / m1_geomyuk) * 100) : 0;
  const m2_geomyuk_pct = m2_geomyuk > 0 ? Math.round((geomyuk_cumulative / m2_geomyuk) * 100) : 0;
  const m12_geomyuk_pct = m12_geomyuk > 0 ? Math.round((geomyuk_cumulative / m12_geomyuk) * 100) : 0;
  const ly3_geomyuk_pct = ly3_geomyuk > 0 ? Math.round((geomyuk_cumulative / ly3_geomyuk) * 100) : 0;

  const m1_hwake_pct = m1_hwake > 0 ? Math.round((hwake_cumulative / m1_hwake) * 100) : 0;
  const m2_hwake_pct = m2_hwake > 0 ? Math.round((hwake_cumulative / m2_hwake) * 100) : 0;
  const m12_hwake_pct = m12_hwake > 0 ? Math.round((hwake_cumulative / m12_hwake) * 100) : 0;

    <table class="summary">
      <tr>
        <th style="width:18%;background:#0F1B3D;color:#fff;font-size:1rem;">${currentMonth}월 누계 (${fixedDateStr})</th>
        <td class="big-num" style="width:22%">${fmt(hwake_cumulative)}</td>
        <th style="width:14%;background:#1B2E5C;color:#fff;">${currentMonth}월 매출액 목표</th>
        <td style="width:18%;font-weight:600;">${fmt(hwake_target)}</td>
        <th style="width:10%;background:#4A90D9;color:#fff;">진도율</th>
        <td style="width:18%;font-weight:700;font-size:1.3rem;" class="${hwake_progress >= 100 ? 'pct-up' : 'pct-down'}">${hwake_progress}%</td>
      </tr>
    </table>
    <table class="summary" style="margin-top:-1px;">
      <tr>
        <td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">
          <div class="row-item"><span class="label">${prevMonth1}월 누계</span><span class="value">${fmt(m1_hwake)}</span></div>
          <div class="row-item pct"><span class="label">${prevMonth1}월 동기비</span><span class="value ${pctClass(m1_hwake_pct)}">${m1_hwake_pct}%</span></div>
        </td>
        <td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">
          <div class="row-item"><span class="label">${prevMonth2}월 누계</span><span class="value">${fmt(m2_hwake)}</span></div>
          <div class="row-item pct"><span class="label">${prevMonth2}월 동기비</span><span class="value ${pctClass(m2_hwake_pct)}">${m2_hwake_pct}%</span></div>
        </td>
        <td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">
          <div class="row-item"><span class="label">12월 누계</span><span class="value">${fmt(m12_hwake)}</span></div>
          <div class="row-item pct"><span class="label">12월 동기비</span><span class="value ${pctClass(m12_hwake_pct)}">${m12_hwake_pct}%</span></div>
        </td>
        <td class="sub-cell" style="width:25%;">
          <div class="row-item"><span class="label">25' ${currentMonth}월 누계</span><span class="value">${fmt(ly3_hwake)}</span></div>
          <div class="row-item pct"><span class="label">25' 동기비</span><span class="value ${pctClass(ly3_hwake_pct)}">${ly3_hwake_pct}%</span></div>
        </td>
      </tr>
    </table>
  </div>

  <div class="summary-wrap">
    <div class="summary-label">1-2. ${currentMonth}월 거래액 현황 (${fixedDateStr}) <span style="color:#888;font-weight:400;font-size:.82rem">(단위: 원)</span></div>
    <table class="summary">
      <tr>
        <th style="width:18%;background:#0F1B3D;color:#fff;font-size:1rem;">${currentMonth}월 누계 (${fixedDateStr})</th>
        <td class="big-num" style="width:22%">${fmt(geomyuk_cumulative)}</td>
        <th style="width:14%;background:#1B2E5C;color:#fff;">${currentMonth}월 거래액 목표</th>
        <td style="width:18%;font-weight:600;">${fmt(geomyuk_target)}</td>
        <th style="width:10%;background:#4A90D9;color:#fff;">진도율</th>
        <td style="width:18%;font-weight:700;font-size:1.3rem;" class="${geomyuk_progress >= 100 ? 'pct-up' : 'pct-down'}">${geomyuk_progress}%</td>
      </tr>
    </table>
    <table class="summary" style="margin-top:-1px;">
      <tr>
        <td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">
          <div class="row-item"><span class="label">${prevMonth1}월 누계</span><span class="value">${fmt(m1_geomyuk)}</span></div>
          <div class="row-item pct"><span class="label">${prevMonth1}월 동기비</span><span class="value ${pctClass(m1_geomyuk_pct)}">${m1_geomyuk_pct}%</span></div>
        </td>
        <td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">
          <div class="row-item"><span class="label">${prevMonth2}월 누계</span><span class="value">${fmt(m2_geomyuk)}</span></div>
          <div class="row-item pct"><span class="label">${prevMonth2}월 동기비</span><span class="value ${pctClass(m2_geomyuk_pct)}">${m2_geomyuk_pct}%</span></div>
        </td>
        <td class="sub-cell" style="width:25%;border-right:2px solid #D8DCE3;">
          <div class="row-item"><span class="label">12월 누계</span><span class="value">${fmt(m12_geomyuk)}</span></div>
          <div class="row-item pct"><span class="label">12월 동기비</span><span class="value ${pctClass(m12_geomyuk_pct)}">${m12_geomyuk_pct}%</span></div>
        </td>
        <td class="sub-cell" style="width:25%;">
          <div class="row-item"><span class="label">25' ${currentMonth}월 누계</span><span class="value">${fmt(ly3_geomyuk)}</span></div>
          <div class="row-item pct"><span class="label">25' 동기비</span><span class="value ${pctClass(ly3_geomyuk_pct)}">${ly3_geomyuk_pct}%</span></div>
        </td>
      </tr>
    </table>

  `;

  document.getElementById('s1-body').innerHTML = html;
}

// ============================================================
// SECTION 2: DAILY DATA (TRANSPOSED)
// ============================================================
function renderSection2() {
  if (!allData || !allData.rows) {
    document.getElementById('s2-body').innerHTML = '데이터 없음';
    return;
  }

  const rows = allData.rows || [];
  const dayNames = ['(일)', '(월)', '(화)', '(수)', '(목)', '(금)', '(토)'];

  // Get data for current week (based on refDate)
  let weekStart = new Date(refDate);
  weekStart.setDate(weekStart.getDate() - weekStart.getDay());

  // Current week: last 7 days from refDate going backwards
  const refDateStr = `${refDate.getFullYear()}-${String(refDate.getMonth()+1).padStart(2,'0')}-${String(refDate.getDate()).padStart(2,'0')}`;
  const filteredRows = rows.filter(r => r.d <= refDateStr);
  const lastRows = filteredRows.slice(-7);

  // Previous week: 7 days before that
  const prevWeekRows = filteredRows.length > 14 ? filteredRows.slice(-14, -7) : [];

  if (lastRows.length === 0) {
    document.getElementById('s2-body').innerHTML = '데이터 없음';
    return;
  }

  // Build header with dates
  let html = `<table class="data-tbl">
    <thead>
      <tr>
        <th class="scol scol-1">주차</th>
  `;

  const dateHeaders = [];
  lastRows.forEach(row => {
    const d = new Date(row.d);
    const dateStr = `${d.getMonth()+1}.${d.getDate()}${dayNames[d.getDay()]}`;
    dateHeaders.push(dateStr);
    html += `<th>${dateStr}</th>`;
  });

  html += `
        <th style="background:#E8EBF0;">TOTAL</th>
      </tr>
    </thead>
    <tbody>
  `;

  // 금주 row (current week)
  let geumjuTotal = 0;
  html += `<tr class="row-total">
    <td class="center scol scol-1">금주</td>
  `;
  lastRows.forEach(row => {
    const daySum = (row.v || []).reduce((a, b) => a + b, 0);
    geumjuTotal += daySum;
    html += `<td>${fmt(daySum)}</td>`;
  });
  html += `<td class="row-total">${fmt(geumjuTotal)}</td>
  </tr>
  `;

  // 전주 row (previous week)
  let jeonjuTotal = 0;
  html += `<tr class="row-total">
    <td class="center scol scol-1">전주</td>
  `;
  lastRows.forEach((row, idx) => {
    const prevRow = prevWeekRows.length > idx ? prevWeekRows[idx] : null;
    const daySum = prevRow ? (prevRow.v || []).reduce((a, b) => a + b, 0) : 0;
    jeonjuTotal += daySum;
    html += `<td>${fmt(daySum)}</td>`;
  });
  html += `<td class="row-total">${fmt(jeonjuTotal)}</td>
  </tr>
  `;

  // 전주비 row (percentage comparison)
  html += `<tr class="row-total" style="border-top:2px solid #1B2E5C;">
    <td class="center scol scol-1">전주비</td>
  `;
  let totalPct = jeonjuTotal > 0 ? Math.round((geumjuTotal / jeonjuTotal) * 100) : 100;
  lastRows.forEach((row, idx) => {
    const daySum = (row.v || []).reduce((a, b) => a + b, 0);
    const prevRow = prevWeekRows.length > idx ? prevWeekRows[idx] : null;
    const prevDaySum = prevRow ? (prevRow.v || []).reduce((a, b) => a + b, 0) : 0;
    const pct = prevDaySum > 0 ? Math.round((daySum / prevDaySum) * 100) : (daySum > 0 ? 100 : 0);
    const pctStr = prevDaySum === 0 && daySum === 0 ? '-' : `<span class="${pct >= 100 ? 'pct-up' : 'pct-down'}">${pct}%</span>`;
    html += `<td>${pctStr}</td>`;
  });
  const totalPctStr = jeonjuTotal === 0 ? '-' : `<span class="${totalPct >= 100 ? 'pct-up' : 'pct-down'}">${totalPct}%</span>`;
  html += `<td class="row-total">${totalPctStr}</td>
  </tr>
  `;

  html += `
    </tbody>
  </table>
  `;

  document.getElementById('s2-body').innerHTML = html;
}

// ============================================================
// SECTION 3: CHART (W1-W52 GROUPED BAR)
// ============================================================
function setChartDay(day) {
  chartDay = day;
  document.querySelectorAll('.chart-day-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  renderSection3();
}

function renderSection3() {
  if (!allData || !allData.rows) {
    document.getElementById('s3-section').style.display = 'none';
    return;
  }

  const rows = allData.rows || [];
  const years = [2024, 2025, 2026];

  // Group by week label
  const weeks = {};

  rows.forEach(row => {
    const weeksKey = chartDay === 'tue' ? row.tw : row.fw;
    if (!weeksKey) return;
    if (!weeks[weeksKey]) weeks[weeksKey] = { 2024: 0, 2025: 0, 2026: 0 };

    const d = new Date(row.d);
    const year = d.getFullYear();
    const daySum = (row.v || []).reduce((a, b) => a + b, 0);
    if (weeks[weeksKey][year] !== undefined) {
      weeks[weeksKey][year] += daySum;
    }
  });

  // Build all weeks W1-W52
  const allWeekLabels = [];
  for (let w = 1; w <= 52; w++) {
    allWeekLabels.push(`W${w}`);
  }

  // Extract data for each year (divide by 1,000,000 for display in 백만원)
  const data2024 = allWeekLabels.map(w => (weeks[w] ? weeks[w][2024] / 1000000 : 0));
  const data2025 = allWeekLabels.map(w => (weeks[w] ? weeks[w][2025] / 1000000 : 0));
  const data2026 = allWeekLabels.map(w => (weeks[w] ? weeks[w][2026] / 1000000 : 0));

  // Determine current week index
  const refDateStr = `${refDate.getFullYear()}-${String(refDate.getMonth()+1).padStart(2,'0')}-${String(refDate.getDate()).padStart(2,'0')}`;
  const currentWeekRow = rows.find(r => r.d === refDateStr);
  const currentWeekLabel = currentWeekRow ? (chartDay === 'tue' ? currentWeekRow.tw : currentWeekRow.fw) : null;
  const currentWeekIndex = currentWeekLabel ? parseInt(currentWeekLabel.substring(1)) - 1 : -1;

  // Build bar colors with red highlight for current week
  const buildColors = (isCurrentWeek) => {
    return allWeekLabels.map((w, idx) => idx === currentWeekIndex ? '#E53935' : (isCurrentWeek ? 'rgba(15,40,100,0.95)' : undefined));
  };

  const buildBorderColors = (isCurrentWeek) => {
    return allWeekLabels.map((w, idx) => idx === currentWeekIndex ? '#B71C1C' : (isCurrentWeek ? 'rgba(15,40,100,1)' : undefined));
  };

  // Render chart
  const ctx = document.getElementById('s3Chart').getContext('2d');
  if (s3ChartInstance) s3ChartInstance.destroy();

  s3ChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: allWeekLabels,
      datasets: [
        {
          label: '2024',
          data: data2024,
          backgroundColor: 'rgba(200,210,220,0.6)',
          borderColor: 'rgba(160,170,180,0.8)',
          borderWidth: 1
        },
        {
          label: '2025',
          data: data2025,
          backgroundColor: 'rgba(100,150,210,0.7)',
          borderColor: 'rgba(150,185,220,0.6)',
          borderWidth: 1
        },
        {
          label: '2026',
          data: data2026,
          backgroundColor: buildColors(true),
          borderColor: buildBorderColors(true),
          borderWidth: 1
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { font: { size: 12 }, padding: 12 }
        },
        tooltip: {
          callbacks: {
            label: function(context) {
              return context.dataset.label + ': ' + context.parsed.y.toFixed(0) + '백만원';
            }
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            callback: function(v) {
              return v.toFixed(0) + '백만';
            }
          }
        }
      }
    }
  });
}

// ============================================================
// SECTION 4: CHANNEL DATA
// ============================================================
function renderSection4() {
  if (!allData || !allData.rows || !allData.channels) {
    document.getElementById('s4-body').innerHTML = '데이터 없음';
    return;
  }

  const rows = allData.rows || [];
  const channels = allData.channels || [];
  const dayNames = ['(일)', '(월)', '(화)', '(수)', '(목)', '(금)', '(토)'];

  // Filter rows up to refDate, then get last 7 days
  const refDateStr = `${refDate.getFullYear()}-${String(refDate.getMonth()+1).padStart(2,'0')}-${String(refDate.getDate()).padStart(2,'0')}`;
  const filteredRows = rows.filter(r => r.d <= refDateStr);
  const lastRows = filteredRows.slice(-7);

  let s4dates = [];
  lastRows.forEach(row => {
    const d = new Date(row.d);
    s4dates.push(`${d.getMonth()+1}.${d.getDate()}${dayNames[d.getDay()]}`);
  });

  // Calculate previous week rows (7 days before lastRows)
  const prevWeekRows = filteredRows.length > 14 ? filteredRows.slice(-14, -7) : [];

  // Build header
  let html = `<table class="data-tbl">
    <thead>
      <tr>
        <th style="min-width:100px;">채널</th>
  `;

  s4dates.forEach(date => {
    html += `<th>${date}</th>`;
  });

  html += `
        <th>합계</th>
        <th>전주합계</th>
        <th>전주비</th>
      </tr>
    </thead>
    <tbody>
  `;

  // Build rows for each channel
  channels.slice(0, 17).forEach((ch, idx) => {
    let chSum = 0;
    let chPrevSum = 0;

    const dayValues = [];
    for (let i = 0; i < lastRows.length; i++) {
      const row = lastRows[i];
      const val = (row && row.v && row.v[idx] != null) ? row.v[idx] : 0;
      dayValues.push(val);
      chSum += val;
    }

    // Actual previous week sum
    for (let i = 0; i < prevWeekRows.length; i++) {
      const row = prevWeekRows[i];
      const val = (row && row.v && row.v[idx] != null) ? row.v[idx] : 0;
      chPrevSum += val;
    }

    const pct = chPrevSum > 0 ? Math.round((chSum / chPrevSum) * 100) : null;
    const pctStr = pct === null ? '-' : (pct >= 100 ? `<span class="pct-up">${pct}%</span>` : `<span class="pct-down">${pct}%</span>`);

    html += `<tr>
      <td class="left" style="font-weight:600;">${ch}</td>
    `;

    dayValues.forEach(val => {
      html += `<td>${fmt(val)}</td>`;
    });

    html += `
      <td class="row-total">${fmt(chSum)}</td>
      <td>${fmt(chPrevSum)}</td>
      <td class="center">${pctStr}</td>
    </tr>
    `;
  });

  // Add total row
  let totalSum = 0;
  let totalPrevSum = 0;
  const totalDays = [];
  for (let i = 0; i < lastRows.length; i++) {
    const row = lastRows[i];
    const daySum = (row && row.v) ? row.v.reduce((a, b) => a + (b || 0), 0) : 0;
    totalDays.push(daySum);
    totalSum += daySum;
  }
  for (let i = 0; i < prevWeekRows.length; i++) {
    const row = prevWeekRows[i];
    totalPrevSum += (row && row.v) ? row.v.reduce((a, b) => a + (b || 0), 0) : 0;
  }
  const totalPct = totalPrevSum > 0 ? Math.round((totalSum / totalPrevSum) * 100) : null;

  html += `<tr class="subtotal-depth0">
    <td style="font-weight:700;">전체</td>
  `;

  totalDays.forEach(val => {
    html += `<td>${fmt(val)}</td>`;
  });

  html += `
    <td>${fmt(totalSum)}</td>
    <td>${fmt(totalPrevSum)}</td>
    <td class="center">${totalPct === null ? '-' : totalPct + '%'}</td>
  </tr>
  `;

  html += `</tbody></table>`;

  document.getElementById('s4-body').innerHTML = html;
}

// ============================================================
// MAIN RENDER FUNCTION
// ============================================================
function renderAllSections() {
  renderSection1();
  renderSection2();
  renderSection3();
  renderSection4();
}

</script>
